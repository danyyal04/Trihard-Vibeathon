  <!-- Sliding dumpling nav — hover + persistent active state -->
  <script>
    (function () {
      const nav   = document.getElementById('desktop-nav');
      const wrap  = document.getElementById('nav-dumpling-wrap');
      const items = nav ? Array.from(nav.querySelectorAll('.nav-item')) : [];
      if (!nav || !wrap || !items.length) return;

      const DUMP_W = 148;   // must match #nav-dumpling-wrap width in CSS
      let activeBtn = null; // currently clicked/active tab

      /* Centre the dumpling over a button (no size change — it's fixed) */
      function centerOn(btn) {
        const navRect = nav.getBoundingClientRect();
        const btnRect = btn.getBoundingClientRect();
        const cx = btnRect.left - navRect.left + btnRect.width / 2;
        wrap.style.left = (cx - DUMP_W / 2) + 'px';
      }

      /* Show the dumpling at `btn`, optionally with the bounce-in animation */
      function showAt(btn, bounce) {
        const wasHidden = !wrap.classList.contains('visible');
        if (wasHidden) {
          /* Snap to position silently, THEN make visible so it doesn't slide from 0 */
          wrap.style.transition = 'opacity 0s';
          centerOn(btn);
          wrap.classList.add('visible');
          requestAnimationFrame(() => {
            wrap.style.transition = '';
            if (bounce) triggerBounce();
          });
        } else {
          wrap.classList.remove('bounce-in');
          centerOn(btn);
          if (bounce) { void wrap.offsetWidth; triggerBounce(); }
        }
      }

      function triggerBounce() {
        wrap.classList.remove('bounce-in');
        void wrap.offsetWidth;          // force reflow to re-trigger animation
        wrap.classList.add('bounce-in');
      }

      function setHovered(btn) {
        items.forEach(b => b.classList.remove('nav-on-dumpling'));
        btn.classList.add('nav-on-dumpling');
      }

      /* ── Click: mark as active, dumpling stays permanently ── */
      items.forEach(btn => {
        btn.addEventListener('click', () => {
          items.forEach(b => b.classList.remove('nav-active', 'nav-on-dumpling'));
          btn.classList.add('nav-active', 'nav-on-dumpling');
          activeBtn = btn;
          showAt(btn, true);
        });
      });

      /* ── Hover: temporarily slide to hovered item ── */
      items.forEach(btn => {
        btn.addEventListener('mouseenter', () => {
          showAt(btn, false);
          setHovered(btn);
        });
      });

      /* ── Mouse leaves nav: return to active tab or hide ── */
      nav.addEventListener('mouseleave', () => {
        if (activeBtn) {
          /* Slide back to the active tab */
          wrap.classList.remove('bounce-in');
          centerOn(activeBtn);
          items.forEach(b => b.classList.remove('nav-on-dumpling'));
          activeBtn.classList.add('nav-on-dumpling');
        } else {
          wrap.classList.remove('visible', 'bounce-in');
          items.forEach(b => b.classList.remove('nav-on-dumpling'));
        }
      });

      /* ── Sync with in-page navigation (e.g. "Back to Home" buttons) ── */
      const routeMap = { home: 0, catalog: 1, 'track-order': 2, apply: 3 };
      window.__dumplingSetRoute = function (route) {
        const idx = routeMap[route];
        if (idx === undefined) {
          /* Non-nav route (admin, confirmation…) — clear active */
          items.forEach(b => b.classList.remove('nav-active', 'nav-on-dumpling'));
          activeBtn = null;
          wrap.classList.remove('visible', 'bounce-in');
        } else {
          const btn = items[idx];
          items.forEach(b => b.classList.remove('nav-active', 'nav-on-dumpling'));
          btn.classList.add('nav-active', 'nav-on-dumpling');
          activeBtn = btn;
          showAt(btn, false);
        }
      };
    })();
  </script>

</body>
</html>
